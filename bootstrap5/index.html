<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulário de Funcionário</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card shadow-sm">
          <div class="card-header bg-primary text-white">
            <h2 class="mb-0">Cadastro de Funcionário</h2>
          </div>

          <div class="card-body">
            <form>
              
              <div class="row g-3">
                <div class="col-md-8">
                  <label for="nome" class="form-label">Nome</label>
                  <input type="text" class="form-control" id="nome" placeholder="Digite o nome completo">
                </div>

                <div class="col-md-4">
                  <label for="dataNascimento" class="form-label">Data de Nascimento</label>
                  <input type="date" class="form-control" id="dataNascimento">
                </div>

                <div class="col-md-4">
                  <label for="sexo" class="form-label">Sexo</label>
                  <select class="form-select" id="sexo">
                    <option selected disabled>Selecione</option>
                    <option>Masculino</option>
                    <option>Feminino</option>
                    <option>Outro</option>
                    <option>Prefiro não informar</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label for="cpf" class="form-label">CPF</label>
                  <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00">
                </div>

                <div class="col-md-4">
                  <label for="rg" class="form-label">RG</label>
                  <input type="text" class="form-control" id="rg" placeholder="00.000.000-0">
                </div>

                <div class="col-md-6">
                  <label for="titulo" class="form-label">Título Eleitoral</label>
                  <input type="text" class="form-control" id="titulo" placeholder="Digite o título eleitoral">
                </div>
              </div>

              <hr class="my-4">

              <h4 class="mb-3">Endereço</h4>

              <div class="row g-3">
                <div class="col-md-6">
                  <label for="rua" class="form-label">Rua</label>
                  <input type="text" class="form-control" id="rua" placeholder="Digite a rua">
                </div>

                <div class="col-md-2">
                  <label for="numero" class="form-label">Número</label>
                  <input type="text" class="form-control" id="numero" placeholder="Nº">
                </div>

                <div class="col-md-4">
                  <label for="bairro" class="form-label">Bairro</label>
                  <input type="text" class="form-control" id="bairro" placeholder="Digite o bairro">
                </div>

                <div class="col-md-4">
                  <label for="cidade" class="form-label">Cidade</label>
                  <input type="text" class="form-control" id="cidade" placeholder="Digite a cidade">
                </div>

                <div class="col-md-4">
                  <label for="estado" class="form-label">Estado</label>
                  <input type="text" class="form-control" id="estado" placeholder="Digite o estado">
                </div>

                <div class="col-md-4">
                  <label for="cep" class="form-label">CEP</label>
                  <input type="text" class="form-control" id="cep" placeholder="00000-000">
                </div>
              </div>

              <hr class="my-4">

              <h4 class="mb-3">Contato</h4>

              <div class="row g-3">
                <div class="col-md-4">
                  <label for="telefoneResidencial" class="form-label">Telefone Residencial</label>
                  <input type="text" class="form-control" id="telefoneResidencial" placeholder="(00) 0000-0000">
                </div>

                <div class="col-md-4">
                  <label for="telefoneCelular" class="form-label">Telefone Celular</label>
                  <input type="text" class="form-control" id="telefoneCelular" placeholder="(00) 00000-0000">
                </div>

                <div class="col-md-4">
                  <label for="instagram" class="form-label">Instagram</label>
                  <input type="text" class="form-control" id="instagram" placeholder="@usuario">
                </div>

                <div class="col-md-6">
                  <label for="facebook" class="form-label">Facebook</label>
                  <input type="text" class="form-control" id="facebook" placeholder="Perfil do Facebook">
                </div>
              </div>

              <hr class="my-4">

              <h4 class="mb-3">Informações Adicionais</h4>

              <div class="row g-3">
                <div class="col-md-4">
                  <label for="filhos" class="form-label">Número de Filhos</label>
                  <input type="number" class="form-control" id="filhos" min="0" placeholder="0">
                </div>

                <div class="col-md-4">
                  <label for="salario" class="form-label">Salário</label>
                  <input type="number" class="form-control" id="salario" min="0" step="0.01" placeholder="0,00">
                </div>
              </div>

              <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <button type="reset" class="btn btn-secondary">Limpar</button>
              </div>

            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
